version: '3.8'

services:
  # 1. MongoDB Database Service
  mongodb:
    image: mongo:6.0
    container_name: devops-companion-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - devops-network

  # 2. Node.js Express Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devops-companion-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/devops-study-companion
    depends_on:
      - mongodb
    networks:
      - devops-network

  # 3. React/Vite Frontend Service (Served via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devops-companion-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - devops-network

volumes:
  mongodb_data:

networks:
  devops-network:
    driver: bridge
