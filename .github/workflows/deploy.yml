name: 🚀 Deploy to AWS

on:
  push:
    branches: ["main"]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

env:
  NODE_VERSION: "20"
  AWS_REGION: "us-east-1"

jobs:
  # ==========================================
  # JOB 1: Deploy Backend to EC2
  # ==========================================
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.commits.*.modified), 'backend/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name:  Install & verify dependencies
        run: |
          cd backend
          npm install

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2 via SSH
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_HOST }} << 'REMOTE_SCRIPT'
            set -e
            echo " Pulling latest changes..."
            cd /app/devops-companion
            git pull origin main

            echo " Installing dependencies..."
            cd backend
            npm install --omit=dev

            echo " Restarting PM2..."
            pm2 restart devops-companion-backend --update-env
            pm2 save

            echo " Backend deployment complete!"
            pm2 status devops-companion-backend
          REMOTE_SCRIPT

      - name: Health Check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}/api/health)
          if [ "$STATUS" = "200" ]; then
            echo " Health check passed (HTTP $STATUS)"
          else
            echo " Health check failed (HTTP $STATUS)"
            exit 1
          fi

  # ==========================================
  # JOB 2: Build & Deploy Frontend to S3
  # ==========================================
  deploy-frontend:
    name:  Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.commits.*.modified), 'frontend/')

    steps:
      - name:  Checkout repository
        uses: actions/checkout@v4

      - name:  Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name:  Install dependencies
        run: |
          cd frontend
          npm install

      - name:  Build Vite app
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: http://${{ secrets.EC2_HOST }}/api

      - name:  Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name:  Sync build to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # index.html should NOT be cached (so users always get the latest)
          aws s3 cp frontend/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name:  Deployment summary
        run: |
          echo " Frontend deployed successfully!"
          echo " URL: https://$(aws cloudfront get-distribution \
            --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --query 'Distribution.DomainName' \
            --output text)"
