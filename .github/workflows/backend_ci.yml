name: Backend CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend_ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Run all steps inside the backend directory
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: 🏗 Checkout repository
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: 📦 Install dependencies
      run: npm install

    # In the future, you can add "npm test" or "npm run lint" here
    # to automatically run your Jest/Mocha tests!
    - name: ✅ Verify Environment
      run: echo "Backend environment successfully setup!"
