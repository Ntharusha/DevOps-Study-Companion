# =============================================================================
# 🚀 DevOps Study Companion — Unified CI/CD Pipeline
# =============================================================================
#
# Job execution matrix (path-based smart triggering):
#
#  ┌─────────────────────────────────────────────────────────────┐
#  │  git push / pull_request → main or dev                      │
#  │                                                             │
#  │  changed paths                                              │
#  │    frontend/**  ──────────→ [ci-frontend]                   │
#  │    backend/**   ──────────→ [ci-backend] → [gitops]         │
#  │    mobile/**    ──────────→ [build-android]                 │
#  └─────────────────────────────────────────────────────────────┘
#
# Secrets needed:
#   DOCKER_HUB_USERNAME  — Docker Hub username
#   DOCKER_HUB_TOKEN     — Docker Hub access token
# =============================================================================

name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

# Cancel previous runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────
# SHARED ENV VARS
# ─────────────────────────────────────────────────
env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:

# =============================================================================
# JOB 1 — Detect which paths changed (runs always, lightweight)
# =============================================================================
  detect-changes:
    name: 🔍 Detect Changed Paths
    runs-on: ubuntu-latest
    # Run on every push/PR — this is the router for all other jobs
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
      mobile:   ${{ steps.filter.outputs.mobile }}
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            mobile:
              - 'mobile/**'

# =============================================================================
# JOB 2 — Frontend CI  (only when frontend/** changes)
# =============================================================================
  ci-frontend:
    name: 🌐 Frontend CI — Build & Validate
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm install

      - name: 🛠 Build Vite app
        run: npm run build

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

# =============================================================================
# JOB 3 — Backend CI  (only when backend/** changes)
# =============================================================================
  ci-backend:
    name: 🔧 Backend CI — Install & Validate
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm install

      - name: ✅ Verify environment
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version:  $(npm --version)"
          echo "Backend CI — All checks passed ✅"

      # Add "npm test" here when you add Jest/Mocha tests
      # - name: 🧪 Run tests
      #   run: npm test

# =============================================================================
# JOB 4 — GitOps: Docker Build + Push + K8s Manifest Update
#          Runs AFTER ci-backend succeeds (only on push to main, not PR)
# =============================================================================
  gitops:
    name: 🐳 GitOps — Docker Build, Push & Manifest Update
    needs: [detect-changes, ci-backend]
    # Only on push to main (not PRs) and only when backend changed
    if: |
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      (needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install backend dependencies
        run: |
          cd backend
          npm install

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 🐳 Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # Tagged with both :latest and the unique commit SHA for traceability
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/devops-daily-tracker-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/devops-daily-tracker-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📝 Update Kubernetes manifest image tag
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_HUB_USERNAME }}/devops-daily-tracker-backend:${{ github.sha }}|g" \
            k8s/backend-deployment.yaml
          echo "--- Updated manifest ---"
          grep "image:" k8s/backend-deployment.yaml

      - name: 📤 Commit & push manifest changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(gitops): update backend image to ${{ github.sha }} [skip ci]"
          file_pattern: 'k8s/backend-deployment.yaml'

# =============================================================================
# JOB 5 — Android APK Build  (only when mobile/** changes)
# =============================================================================
  build-android:
    name: 📱 Android — Build APK
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.mobile == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install mobile dependencies
        run: |
          cd mobile
          npm install

      - name: 🔨 Build Release APK
        run: |
          cd mobile
          npx expo prebuild --platform android --no-install
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: devops-companion-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

# =============================================================================
# JOB 6 — Pipeline Summary (runs last, always)
# =============================================================================
  summary:
    name: 📋 Pipeline Summary
    needs: [ci-frontend, ci-backend, gitops, build-android]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Print pipeline result
        run: |
          echo "======================================"
          echo "  DevOps Study Companion — CI/CD Done"
          echo "======================================"
          echo "Frontend CI : ${{ needs.ci-frontend.result }}"
          echo "Backend  CI : ${{ needs.ci-backend.result }}"
          echo "GitOps      : ${{ needs.gitops.result }}"
          echo "Android APK : ${{ needs.build-android.result }}"
          echo "======================================"
          echo "Commit SHA  : ${{ github.sha }}"
          echo "Branch      : ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.event_name }}"
          echo "======================================"
