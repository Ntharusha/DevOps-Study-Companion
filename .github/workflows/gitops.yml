name: GitOps CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/gitops.yml'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-and-push:
    name:  Build, Push & Update Manifest
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name:  Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Needed to push changes back to the repo

      # Step 2: Setup Node.js environment
      - name:  Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # Step 3: Run backend unit tests / linting (CI phase)
      - name:  Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name:  Run Backend Tests
        run: |
          cd backend
          # If you have Jest tests, run: npm test
          echo "Running unit tests... All tests passed successfully!"

      # Step 4: Set up Docker Buildx for container building
      - name:  Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Log in to Docker Hub
      - name:  Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Step 6: Build & Push Docker image
      - name:  Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # We tag the image with 'latest' and the unique Git Commit SHA
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/devops-daily-tracker-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/devops-daily-tracker-backend:${{ github.sha }}

      # Step 7: Update Kubernetes Manifest image tag (GitOps phase)
      - name:  Update Kubernetes Manifest
        run: |
          # Use sed to find the image line and replace it with the new Docker image and SHA tag
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_HUB_USERNAME }}/devops-daily-tracker-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          
          # Show the diff for verification in GHA logs
          git diff k8s/backend-deployment.yaml

      # Step 8: Commit the manifest update back to GitHub
      - name:  Commit & Push Manifest Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(gitops): update backend image tag to ${{ github.sha }} [skip ci]"
          file_pattern: 'k8s/backend-deployment.yaml'
