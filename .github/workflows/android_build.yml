name: Build Android APK
on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/android_build.yml'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: ⚙️ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: |
          cd mobile
          npm install

      - name: 🛠 Build APK
        run: |
          cd mobile
          npx expo prebuild --platform android --no-install
          mkdir -p android/app/src/main/assets
          npx expo export:embed --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: devops-companion-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
