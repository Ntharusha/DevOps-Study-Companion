name: Build Android APK
on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/android_build.yml'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: ⚙️ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10.2

      - name: ⚙️ Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: |
          cd mobile
          npm install

      - name: 🛠 Prebuild
        run: |
          cd mobile
          npx expo prebuild --platform android --no-install
          # Fix 1: Force Kotlin 2.1.0 in all Gradle files
          find android -name "*.gradle" -type f -exec sed -i 's/\$kotlinVersion/2.1.0/g' {} +
          find android -name "*.gradle" -type f -exec sed -i "s/kotlinVersion = .*/kotlinVersion = '2.1.0'/g" {} +
          # Fix 2: Inject "packageDebugAssets" ghost property and force root kotlinVersion
          sed -i '/allprojects {/a \    ext { packageDebugAssets = {}; kotlinVersion = "2.1.0" }' android/build.gradle
          # Fix 3: Force versions in properties
          echo "kotlinVersion=2.1.0" >> android/gradle.properties
          echo "android.kotlin.version=2.1.0" >> android/gradle.properties
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: devops-companion-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
